<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Know My Health - Video Test</title>
    <!-- Import Agora Web SDK -->
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.2.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f4f4f9; padding: 20px; }
        
        .form-container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 500px; margin: 0 auto 20px auto; text-align: left; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px;}
        .form-group input { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-family: monospace; }
        
        .video-container { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        .video-box { width: 400px; height: 300px; background-color: black; border-radius: 8px; overflow: hidden; position: relative; }
        .video-label { position: absolute; bottom: 10px; left: 10px; color: white; background: rgba(0,0,0,0.5); padding: 5px; z-index: 10; border-radius: 4px; font-size: 14px;}
        
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; color: white; border: none; border-radius: 5px; width: 100%; font-weight: bold;}
        #join-btn { background-color: #2b6cb0; }
        #join-btn:hover { background-color: #1a4a7a; }
        #leave-btn { background-color: #c53030; display: none; margin: 0 auto; max-width: 200px;}
    </style>
</head>
<body>

    <h2>Consultation Video Test</h2>
    
    <!-- Input Form -->
    <div class="form-container" id="setup-form">
        <div class="form-group">
            <label>Agora App ID (from .env)</label>
            <input type="text" id="app-id" placeholder="Enter App ID">
        </div>
        <div class="form-group">
            <label>Channel Name (from API response)</label>
            <input type="text" id="channel" placeholder="e.g. consultation_8dee4b1c2cf7">
        </div>
        <div class="form-group">
            <label>Token (from API response)</label>
            <input type="text" id="token" placeholder="Enter the long token string">
        </div>
        <div class="form-group">
            <label>UID (from API response)</label>
            <input type="text" id="uid" placeholder="e.g. dda755f8-f274-4f29-8e04-de34107612cc">
        </div>
        <button id="join-btn">Join Call</button>
    </div>

    <!-- Leave Button (Hidden initially) -->
    <button id="leave-btn">Leave Call</button>

    <!-- Video Players -->
    <div class="video-container">
        <div id="local-player" class="video-box">
            <div class="video-label">You (Local)</div>
        </div>
        <div id="remote-player" class="video-box">
            <div class="video-label">Doctor (Remote)</div>
        </div>
    </div>

    <script>
        const client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
        let localTracks = { videoTrack: null, audioTrack: null };

        async function joinCall() {
            // Get values from input fields
            const appId = document.getElementById("app-id").value.trim();
            const channel = document.getElementById("channel").value.trim();
            const token = document.getElementById("token").value.trim();
            const uid = document.getElementById("uid").value.trim();

            if (!appId || !channel || !token || !uid) {
                alert("Please fill in all fields before joining!");
                return;
            }

            // Update UI
            document.getElementById("setup-form").style.display = "none";
            document.getElementById("leave-btn").style.display = "block";

            try {
                // 1. Join the Agora Channel
                await client.join(appId, channel, token, uid);
                console.log("Joined channel successfully!");

                // 2. Create local microphone and camera tracks
                const [audioTrack, videoTrack] = await AgoraRTC.createMicrophoneAndCameraTracks();
                localTracks.audioTrack = audioTrack;
                localTracks.videoTrack = videoTrack;

                // 3. Play local video
                localTracks.videoTrack.play("local-player");

                // 4. Publish local tracks to the channel
                await client.publish(Object.values(localTracks));

                // 5. Listen for remote users joining
                client.on("user-published", async (user, mediaType) => {
                    await client.subscribe(user, mediaType);
                    if (mediaType === "video") {
                        user.videoTrack.play("remote-player");
                    }
                    if (mediaType === "audio") {
                        user.audioTrack.play();
                    }
                });

                client.on("user-unpublished", (user) => {
                    console.log("User left", user);
                    // Remote video removes itself automatically
                });

            } catch (error) {
                console.error("Error joining call:", error);
                alert("Failed to join call. Check console for details.");
                leaveCall(); // Reset UI
            }
        }

        async function leaveCall() {
            // Stop and close local tracks
            for (trackName in localTracks) {
                var track = localTracks[trackName];
                if (track) { track.stop(); track.close(); }
            }
            // Leave the channel
            await client.leave();
            
            // Reset UI
            document.getElementById("setup-form").style.display = "block";
            document.getElementById("leave-btn").style.display = "none";
            
            // Reset Video boxes
            document.getElementById("local-player").innerHTML = '<div class="video-label">You (Local)</div>';
            document.getElementById("remote-player").innerHTML = '<div class="video-label">Doctor (Remote)</div>';
        }

        document.getElementById("join-btn").addEventListener("click", joinCall);
        document.getElementById("leave-btn").addEventListener("click", leaveCall);
    </script>
</body>
</html>
